<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support Form - Greek Games Studios</title>
  
  <meta name="description" content="Submit a support ticket to Greek Games Studios. We are here to help with any technical issues, billing, or account problems.">
  <meta name="robots" content="noindex, nofollow"> <link rel="icon" type="image/png" href="/images/ggs-logo.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com" defer></script>
  
  <style>
    body {
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }
    
    .gradient-text {
      background: linear-gradient(90deg, #22d3ee, #a855f7, #ec4899);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    
    .fade-element {
      opacity: 0;
      transform: translateY(15px);
      transition: opacity 0.8s ease-out, transform 0.8s ease-out;
      will-change: opacity, transform;
    }
    
    .fade-in-active {
      opacity: 1;
      transform: translateY(0);
    }
    
    .back-btn {
      transition: all 0.3s ease;
    }
    
    .back-btn:hover {
      transform: translateX(-3px);
    }
    
    .form-input {
      transition: all 0.3s ease;
    }
    
    .form-input:focus {
      border-color: #22d3ee;
      box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.2);
    }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-[#0d0d0d] via-[#111] to-[#0d0d0d] text-gray-300 overflow-x-hidden">

  <header class="fixed w-full top-0 left-0 z-40 backdrop-blur-md bg-[#0d0d0d]/90 border-b border-cyan-500/20 shadow-xl" role="banner">
    <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8" aria-label="Top navigation">
      <div class="flex justify-between items-center h-16 md:h-20">
        <a href="/support.html" class="back-btn flex items-center text-cyan-400 hover:text-cyan-300" aria-label="Go back to Support Page">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
          </svg>
          Back to Support
        </a>
      </div>
    </nav>
  </header>

  <main class="pt-32 pb-20 px-6 md:px-12 lg:px-24 max-w-6xl mx-auto" role="main">
    <div class="backdrop-blur-lg bg-[#1a1a1a]/80 rounded-3xl p-8 md:p-12 border border-cyan-600/30 shadow-[0_0_40px_#0ff1] fade-element">
      
      <header class="text-center mb-12">
        <h1 class="text-4xl md:text-5xl lg:text-6xl font-extrabold gradient-text mb-6">
          Support Form
        </h1>
        <div class="w-24 h-1 bg-gradient-to-r from-cyan-400 to-purple-500 rounded-full mx-auto"></div>
      </header>

      <section aria-labelledby="form-title">
        <h2 id="form-title" class="sr-only">Submit your details</h2>
        <form name="support-form" method="POST" data-netlify="true" netlify-honeypot="bot-field" data-netlify-recaptcha="true" enctype="multipart/form-data" aria-label="Technical Support Form">
          
          <p class="hidden" style="display:none;">
            <label>Don’t fill this out if you’re human: <input name="bot-field" tabindex="-1"/></label>
          </p>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <input type="hidden" name="form-name" value="support-form">
            <div>
              <label for="name" class="block text-sm font-medium text-gray-400 mb-2">Your Name <span class="text-red-500" aria-hidden="true">*</span></label>
              <input type="text" id="name" name="name" class="form-input w-full px-4 py-3 bg-[#1a1a1a]/50 border border-gray-700/50 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500/50 focus:border-transparent text-white" required aria-required="true">
            </div>
            <div>
              <label for="email" class="block text-sm font-medium text-gray-400 mb-2">Email Address <span class="text-red-500" aria-hidden="true">*</span></label>
              <input type="email" id="email" name="email" class="form-input w-full px-4 py-3 bg-[#1a1a1a]/50 border border-gray-700/50 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500/50 focus:border-transparent text-white" required aria-required="true">
            </div>
          </div>

          <div class="mb-8">
            <label for="subject" class="block text-sm font-medium text-gray-400 mb-2">Subject <span class="text-red-500" aria-hidden="true">*</span></label>
            <input type="text" id="subject" name="subject" class="form-input w-full px-4 py-3 bg-[#1a1a1a]/50 border border-gray-700/50 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500/50 focus:border-transparent text-white" required aria-required="true">
          </div>

          <div class="mb-8">
            <label for="game" class="block text-sm font-medium text-gray-400 mb-2">Related Game</label>
            <select id="game" name="game" class="form-input w-full px-4 py-3 bg-[#1a1a1a]/50 border border-gray-700/50 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500/50 focus:border-transparent text-white">
              <option value="">Select a game</option>
              <option value="tech-tycoon">Try Not To Rage: Forest</option>
              <option value="unlimited-roleplay">Try Not To Rage: Sky</option>
              <option value="other">Other</option>
            </select>
          </div>

          <div class="mb-8">
            <label for="issue-type" class="block text-sm font-medium text-gray-400 mb-2">Issue Type <span class="text-red-500" aria-hidden="true">*</span></label>
            <select id="issue-type" name="issue-type" class="form-input w-full px-4 py-3 bg-[#1a1a1a]/50 border border-gray-700/50 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500/50 focus:border-transparent text-white" required aria-required="true">
              <option value="">Select issue type</option>
              <option value="technical">Technical Issue</option>
              <option value="account">Account Problem</option>
              <option value="payment">Payment/Billing</option>
              <option value="other">Other</option>
            </select>
          </div>

          <div class="mb-8">
            <label for="message" class="block text-sm font-medium text-gray-400 mb-2">Description <span class="text-red-500" aria-hidden="true">*</span></label>
            <textarea id="message" name="message" rows="6" class="form-input w-full px-4 py-3 bg-[#1a1a1a]/50 border border-gray-700/50 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500/50 focus:border-transparent text-white" required aria-required="true"></textarea>
          </div>

          <div class="mb-8">
            <label for="attachments" class="block text-sm font-medium text-gray-400 mb-2">Attachments (Screenshots, Logs, etc.)</label>
            <input type="file" id="attachments" name="attachments" class="form-input w-full px-4 py-2 bg-[#1a1a1a]/50 border border-gray-700/50 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500/50 focus:border-transparent text-white" multiple>
            <p class="text-xs text-gray-500 mt-2" id="file-desc">Maximum file size: 10MB. Supported formats: JPG, PNG, PDF, TXT</p>
          </div>

          <div class="flex items-center mb-8">
            <input id="terms" type="checkbox" name="terms" class="w-4 h-4 bg-[#1a1a1a]/50 border border-gray-700/50 rounded focus:ring-cyan-500 focus:ring-2" required aria-required="true">
            <label for="terms" class="ml-2 text-sm text-gray-400">
              I agree to the <a href="/privacy-policy.html" class="text-cyan-400 hover:text-cyan-300">Privacy Policy</a> and understand my data will be processed according to it.
            </label>
          </div>

          <div data-netlify-recaptcha="true" class="mb-8 flex justify-center"></div>

          <div class="text-center">
            <button type="submit" class="px-8 py-3 bg-gradient-to-r from-cyan-500 to-purple-600 text-white font-medium rounded-lg hover:from-cyan-600 hover:to-purple-700 transition-all duration-300 transform hover:scale-105 shadow-lg shadow-cyan-500/20 hover:shadow-cyan-500/30">
              Submit Request
            </button>
          </div>
        </form>
      </section>
    </div>
  </main>

  <footer class="py-12 px-6 border-t border-gray-800/50 fade-element" role="contentinfo">
    <div class="max-w-6xl mx-auto text-center">
      <p class="text-gray-500 text-sm">
        © <span id="current-year"></span> Greek Games Studios. All rights reserved.
      </p>
    </div>
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('current-year').textContent = new Date().getFullYear();

      // Performance: IntersectionObserver API for smooth fading
      const fadeObserver = new IntersectionObserver((entries, observer) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            requestAnimationFrame(() => {
              entry.target.classList.add('fade-in-active');
              observer.unobserve(entry.target);
            });
          }
        });
      }, { root: null, rootMargin: '0px', threshold: 0.1 });

      document.querySelectorAll('.fade-element').forEach(el => fadeObserver.observe(el));
    });
  </script>
</body>
</html>
